# Frosted Glass Dark Lite - Dark Room variant
# Applied when ambient lux < 5 (brightness = 1) via browser_mod theme switching.
# card-mod CSS is inherited from Frosted Glass Dark Lite via card-mod-theme.
#
# Color strategy: rather than explicitly red-shifting every variable, a CSS filter
# chain on ha-card (via ambient-dim-filter) shifts all card content to deep red
# automatically — clock digits, icons, text, images, custom cards, everything.
# Page-level surfaces (background, header, dialogs) are set explicitly to black.

Frosted Glass Dark Lite Dark Room:
  card-mod-theme: 'Frosted Glass Dark Lite'

  # Red-shift filter applied to every ha-card via the inherited card-mod CSS.
  # sepia(1) converts whites/greys to warm gold → saturate(2) deepens to orange-red
  # → hue-rotate(-10deg) nudges toward red → brightness(0.3) dims to dark room levels.
  ambient-dim-filter: 'brightness(0.3) sepia(1) saturate(2) hue-rotate(-10deg)'

  modes:
    dark: {}

  # =========================
  # PAGE-LEVEL SURFACES
  # (not inside ha-card, so not covered by ambient-dim-filter)
  # =========================
  background-image: 'none'
  lovelace-background: 'none'
  primary-background-color: 'rgb(0, 0, 0)'
  secondary-background-color: 'rgba(5, 2, 2, 0.98)'
  clear-background-color: 'rgba(5, 2, 2, 0.98)'

  app-header-background-color: 'rgba(0, 0, 0, 0.01)'
  app-header-text-color: 'rgba(160, 40, 40, 0.9)'
  app-header-edit-background-color: 'rgba(10, 2, 2, 0.95)'
  app-header-edit-text-color: 'rgba(160, 40, 40, 0.95)'
  app-theme-color: 'rgb(0, 0, 0)'

  sidebar-background-color: 'rgba(0, 0, 0, 0.98)'
  sidebar-icon-color: 'rgba(140, 35, 35, 0.6)'
  sidebar-text-color: 'rgba(140, 35, 35, 0.8)'
  sidebar-selected-icon-color: 'rgba(160, 40, 40, 0.95)'
  sidebar-selected-text-color: 'rgba(160, 40, 40, 0.98)'

  ha-dialog-surface-background: 'rgba(8, 2, 2, 0.99)'
  paper-dialog-background-color: 'rgba(8, 2, 2, 0.99)'
  mdc-dialog-scrim-color: 'rgba(0, 0, 0, 0.97)'
  dialog-box-shadow: '0 12px 20px rgba(0, 0, 0, 0.8)'

  # =========================
  # CARD SURFACES
  # =========================
  card-background-color: 'rgba(8, 2, 2, 0.97)'
  ha-card-background: 'rgba(8, 2, 2, 0.97)'
  ha-card-border-radius: '18px'
  ha-card-border-color: 'rgba(80, 20, 20, 0.3)'
  ha-card-border-width: '0.5px'
  ha-card-border-style: 'solid'
  ha-card-border: '0.5px solid rgba(80, 20, 20, 0.2)'
  ha-card-box-shadow: '0 12px 20px rgba(0, 0, 0, 0.8)'
  ha-view-sections-column-gap: '17px'
  ha-view-sections-column-min-width: 320px

  # =========================
  # MISC SIZES (kept in sync with base)
  # =========================
  border-radius: '18px'
  paper-slider-height: '5px'
  mcg-title-font-weight: '400'
  mush-title-font-weight: '500'
  mush-title-font-size: 'var(--token-size-font-2xl)'

  # Clock card digit colour — referenced by clock card_mod as var(--clock-digit-color)
  # The filter already red-shifts most content, but the clock hardcodes color: white
  # in its own card_mod, so this explicit variable is still needed for it.
  clock-digit-color: 'rgba(200, 60, 60, 0.9)'


  # --- End of Theme ---
